<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 페이지</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #f4f6f9; 
      font-family: 'Malgun Gothic', sans-serif;
    }

    .login-card {
      background-color: white; 
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
      width: 350px;
    }

    .card-title {
      font-size: 28px; 
      font-weight: 800; 
      margin: 0 0 8px 0;
      color: #1f2937;
      text-align: center;
    }

    .card-subtitle {
      font-size: 14px;
      color: #6b7280; 
      margin: 0 0 30px 0;
      text-align: center;
    }

    .input-group {
      text-align: left;
      margin-bottom: 15px;
    }

    .input-group label {
      display: block;
      font-size: 12px;
      margin-bottom: 5px;
      font-weight: bold;
      color: #374151;
    }

    input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      box-sizing: border-box;
      outline: none;
    }

    button {
      width: 100%;
      padding: 12px;
      background-color: #2563eb; 
      color: white; 
      border: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
      transition: background 0.3s;
    }

    button:hover {
      background-color: #1d4ed8;
    }
  </style>
</head>

<body>
  <div class="login-card">
    <div class="card-title">KoreaNirsa</div>
    <div class="card-subtitle">관리자 로그인</div>

    <div class="input-group">
      <label>이메일</label>
      <input type="email" id="email" placeholder="admin@example.com">
    </div>

    <div class="input-group">
      <label>비밀번호</label>
      <input type="password" id="password" placeholder="••••••••">
    </div>

    <button onclick="handleLogin()">로그인</button>
  </div>

  <script>
    function handleLogin() {
      const emailInput = document.getElementById('email').value;
      const passwordInput = document.getElementById('password').value;

      const VALID_EMAIL = "hong@example.com";
      const VALID_PW = "qwer1234";

      if (emailInput === VALID_EMAIL && passwordInput === VALID_PW) {
        location.href = "userList.html";
      } else {
        alert("이메일 또는 비밀번호가 일치하지 않습니다.");
      }
    }
  </script>
</body>
</html>
